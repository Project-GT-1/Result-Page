services:
  - type: web
    name: student-result-portal
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: result-portal-db
          property: connectionString
      - key: FLASK_DEBUG
        value: false

databases:
  - name: result-portal-db
    databaseName: results
    user: admin
    plan: free
